<!doctype html>
<html>
  <head>
    <title>Employee Payroll Register</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
      }

      table {
        margin: auto;
        border-collapse: collapse;
      }

      td {
        padding: 6px;
      }

      input {
        padding: 4px;
      }

      h2 {
        color: #b30000;
      }

      button {
        padding: 6px 12px;
      }
    </style>

    <script>
      function calculatePayroll() {
        let designation = document.getElementById("designation").value;
        let hoursWorked = parseFloat(document.getElementById("hours").value);

        if (isNaN(hoursWorked)) {
          alert("Please enter valid hours worked");
          return;
        }

        let monthlyRate = 0;

        switch (designation) {
          case "Dean":
            monthlyRate = 25000;
            break;
          case "Program Head":
            monthlyRate = 20000;
            break;
          case "Librarian":
            monthlyRate = 18000;
            break;
          case "Instructor5":
            monthlyRate = 15000;
            break;
          case "Instructor4":
            monthlyRate = 14000;
            break;
          case "Instructor3":
            monthlyRate = 13000;
            break;
          case "Instructor2":
            monthlyRate = 12000;
            break;
          case "Instructor1":
            monthlyRate = 11000;
            break;
        }

        let dailyRate = monthlyRate / 22;
        let hourlyRate = dailyRate / 8;

        let grossPay = hourlyRate * hoursWorked;

        let sss = grossPay * 0.05;
        let philhealth = grossPay * 0.025;
        let pagibig = 300;
        let tax = grossPay * 0.1;

        let totalDeduction = sss + philhealth + pagibig + tax;
        let netPay = grossPay - totalDeduction;

        document.getElementById("monthly").value = monthlyRate.toFixed(2);
        document.getElementById("daily").value = dailyRate.toFixed(2);
        document.getElementById("hourly").value = hourlyRate.toFixed(2);
        document.getElementById("gross").value = grossPay.toFixed(2);

        document.getElementById("sss").value = sss.toFixed(2);
        document.getElementById("philhealth").value = philhealth.toFixed(2);
        document.getElementById("pagibig").value = pagibig.toFixed(2);
        document.getElementById("tax").value = tax.toFixed(2);
        document.getElementById("total").value = totalDeduction.toFixed(2);

        document.getElementById("net").value = netPay.toFixed(2);
      }
    </script>
  </head>

  <body>
    <h2>COLEGIO DE SAN GABRIEL ARCANGEL, INC.</h2>
    <h3>EMPLOYEE PAYROLL REGISTER</h3>

    <table>
      <tr>
        <td>Employee Name</td>
        <td><input type="text" /></td>
      </tr>

      <tr>
        <td>Designation</td>
        <td>
          <select id="designation">
            <option value="Dean">Dean</option>
            <option value="Program Head">Program Head</option>
            <option value="Librarian">Librarian</option>
            <option value="Instructor5">Instructor 5</option>
            <option value="Instructor4">Instructor 4</option>
            <option value="Instructor3">Instructor 3</option>
            <option value="Instructor2">Instructor 2</option>
            <option value="Instructor1">Instructor 1</option>
          </select>
        </td>
      </tr>

      <tr>
        <td>Hours Worked</td>
        <td><input type="text" id="hours" /></td>
      </tr>

      <tr>
        <td></td>
        <td><button onclick="calculatePayroll()">Calculate Payroll</button></td>
      </tr>
    </table>

    <br /><br />

    <table border="1">
      <tr>
        <th colspan="2">PAYROLL INFORMATION</th>
        <th colspan="2">DEDUCTIONS</th>
        <th>TAKE HOME PAY</th>
      </tr>

      <tr>
        <td>Monthly Rate</td>
        <td><input id="monthly" readonly /></td>

        <td>SSS</td>
        <td><input id="sss" readonly /></td>

        <td rowspan="5"><input id="net" readonly /></td>
      </tr>

      <tr>
        <td>Daily Rate</td>
        <td><input id="daily" readonly /></td>

        <td>PhilHealth</td>
        <td><input id="philhealth" readonly /></td>
      </tr>

      <tr>
        <td>Hourly Rate</td>
        <td><input id="hourly" readonly /></td>

        <td>PAGIBIG</td>
        <td><input id="pagibig" readonly /></td>
      </tr>

      <tr>
        <td>Gross Pay</td>
        <td><input id="gross" readonly /></td>

        <td>Tax</td>
        <td><input id="tax" readonly /></td>
      </tr>

      <tr>
        <td></td>
        <td></td>

        <td>Total Deduction</td>
        <td><input id="total" readonly /></td>
      </tr>
    </table>
  </body>
</html>
